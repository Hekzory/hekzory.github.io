# Builds the site on every push and PR; deploys dist/ to GitHub Pages on push to main.

name: Build & Deploy

on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - 'main'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # full history so sitemap <lastmod> reflects real commit dates
          # (vite-plugin-sitemap.js falls back to build time on shallow clones)
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install
      - run: pnpm run build
      - uses: actions/upload-pages-artifact@v5
        if: github.event_name != 'pull_request'
        with:
          path: dist
          # without this the artifact silently drops dist/.well-known
          include-hidden-files: true

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
      # Tell IndexNow-participating engines (Bing, Yandex, Seznam, ...) the
      # site changed. URL list comes from the live sitemap so it never drifts
      # from vite-plugin-sitemap.js. Best-effort: a failed ping must not fail
      # the deploy. The key is public by design (served at its keyLocation).
      - name: Ping IndexNow
        continue-on-error: true
        run: |
          key=ec5433724775ed2bbe6e7d5ea943683d
          urls=$(curl -sf https://tsv.one/sitemap.xml | grep -oP '(?<=<loc>)[^<]+' | jq -R . | jq -sc .)
          curl -sS -X POST https://api.indexnow.org/indexnow \
            -H 'Content-Type: application/json; charset=utf-8' \
            -d "{\"host\":\"tsv.one\",\"key\":\"$key\",\"keyLocation\":\"https://tsv.one/$key.txt\",\"urlList\":$urls}"
