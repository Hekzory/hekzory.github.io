<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favicon.svg" sizes="any" type="image/svg+xml" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preload" href="/css/martianmono.woff2" as="font" type="font/woff2" crossorigin />
    <link href="/css/style.css" rel="stylesheet" />
    <link href="/css/articles.css" rel="stylesheet" />
    <title>Articles | Oleg Tsvetkov</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body class="articles-page">
    <load src="components/icons_common.html" />

    <!-- Top Bar (Waybar style) -->
    <load src="components/waybar.html" home_active="" resume_active="" articles_active="active"
        window_title="~ / home / oleg / articles" />

    <main class="articles-container">
        <header class="articles-header">
            <h1 class="name-shimmer">{{t.art.title}}</h1>
            <p class="articles-intro">{{t.art.intro}}</p>
        </header>

        <ul class="articles-list">
            <li>
                <a class="tile article-card" href="{{base}}/articles/why-this-blog">
                    <span class="article-card-meta"><time datetime="2026-06-13">{{t.art.posts.why_this_blog.date}}</time></span>
                    <h2 class="article-card-title">{{t.art.posts.why_this_blog.title}}</h2>
                    <p class="article-card-excerpt">{{t.art.posts.why_this_blog.excerpt}}</p>
                </a>
            </li>
        </ul>
    </main>

    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@graph": [
                {
                    "@type": "Blog",
                    "@id": "{{canonical}}#blog",
                    "url": "{{canonical}}",
                    "name": "{{t.art.title}} - Oleg Tsvetkov",
                    "description": "{{t.art.intro}}",
                    "inLanguage": "{{locale}}",
                    "isPartOf": { "@id": "{{origin}}/#website" },
                    "author": {
                        "@type": "Person",
                        "@id": "{{origin}}/#person",
                        "name": "Oleg Tsvetkov",
                        "url": "{{origin}}/"
                    },
                    "mainEntity": { "@id": "{{canonical}}#postlist" }
                },
                {
                    "@type": "ItemList",
                    "@id": "{{canonical}}#postlist",
                    "itemListElement": [
                        {
                            "@type": "ListItem",
                            "position": 1,
                            "url": "{{origin}}{{base}}/articles/why-this-blog",
                            "name": "{{t.art.posts.why_this_blog.title}}"
                        }
                    ]
                },
                {
                    "@type": "BreadcrumbList",
                    "@id": "{{canonical}}#breadcrumb",
                    "itemListElement": [
                        { "@type": "ListItem", "position": 1, "name": "{{t.art.crumb_home}}", "item": "{{origin}}{{base}}/" },
                        { "@type": "ListItem", "position": 2, "name": "{{t.art.title}}" }
                    ]
                }
            ]
        }
    </script>

    <script type="module" src="/js/main.js" defer></script>
    <load src="components/speculation.html" />
</body>

</html>
